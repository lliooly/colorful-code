name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # v0.19.0

      - name: Verify Bazel contract codegen
        run: bazel test //packages/schema:contract_codegen_check

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install --yes ripgrep
          rg --version

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Bazel orchestration contract
        run: REQUIRE_BAZEL=1 bash bazel/test/run-task.test.sh

      - name: Lint
        run: bazel run //:lint

      - name: Typecheck
        run: bazel run //:typecheck

      - name: Build TypeScript packages
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3001
        run: bazel run //:build

      - name: Test non-desktop packages
        run: bazel run //:test

  desktop:
    name: Desktop checks
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # v0.19.0

      - name: Build desktop server sidecar
        run: bazel run //:desktop-sidecar

      - name: Check desktop crate
        run: bazel run //:desktop-check

      - name: Test desktop crate
        run: bazel run //:desktop-test
