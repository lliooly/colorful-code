name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3001

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install --yes ripgrep
          rg --version

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint --filter='!@colorful-code/desktop'

      - name: Typecheck
        run: pnpm turbo run typecheck --filter='!@colorful-code/desktop'

      - name: Build TypeScript packages
        run: pnpm turbo run build --filter='!@colorful-code/desktop'

      - name: Test non-desktop packages
        run: pnpm test

  desktop:
    name: Desktop checks
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop server sidecar
        run: pnpm --filter @colorful-code/desktop build:server-sidecar

      - name: Check desktop crate
        run: pnpm --filter @colorful-code/desktop lint

      - name: Test desktop crate
        run: pnpm --filter @colorful-code/desktop test
